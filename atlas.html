<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlas | Door to the Parsklands</title>
<link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Baskervville&display=swap" rel="stylesheet" />
  <style>
    main {
      min-height: 100vh;
      padding: 36px 16px 64px;
      font-family: 'Baskervville', serif;
    }

    .atlas-shell {
      max-width: 980px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.93);
      border: 4px groove #222;
      box-shadow: 4px 4px 8px #555;
      padding: 28px 24px;
    }

    .atlas-heading {
      text-align: center;
      margin-bottom: 26px;
    }

    .atlas-heading h1 {
      margin: 0 0 16px;
      font-size: clamp(30px, 4vw, 44px);
      text-shadow: 0 0 14px rgba(255, 255, 255, 0.99), 0 0 8px rgba(255, 255, 255, 0.97), 1px 1px 0 rgba(255, 255, 255, 0.95);
    }

    .atlas-map {
      width: min(100%, 760px);
      margin: 0 auto 16px;
      display: block;
      border: 3px solid #222;
      box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.2);
    }

    .atlas-intro {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(34, 34, 34, 0.45);
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.45;
      color: #111;
    }

    .atlas-region-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 14px 0 0;
      padding: 10px;
      border-top: 2px solid #444;
      border-bottom: 2px solid #444;
      background: rgba(255, 255, 255, 0.72);
    }

    .atlas-region-nav:empty {
      display: none;
    }

    .atlas-region-nav a {
      display: inline-block;
      color: #000066;
      background: #fffbe8;
      border: 2px outset #ccc;
      padding: 4px 8px;
      font-family: "Courier New", monospace;
      font-size: 15px;
      font-weight: bold;
      line-height: 1.2;
      text-decoration: none;
    }

    .atlas-region-nav a:hover,
    .atlas-region-nav a:focus {
      color: #900;
      background: #fff4c4;
      text-decoration: underline wavy #900;
    }

    .atlas-region {
      margin-top: 24px;
      scroll-margin-top: 16px;
    }

    .atlas-region h2 {
      margin: 0 0 12px;
      border-bottom: 2px solid #444;
      padding-bottom: 6px;
      font-size: clamp(26px, 3vw, 34px);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.98), 0 0 6px rgba(255, 255, 255, 0.96), 1px 1px 0 rgba(255, 255, 255, 0.92);
    }

    .atlas-region-description {
      margin: 0 0 14px;
      font-size: 18px;
      line-height: 1.45;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.97), 0 0 4px rgba(255, 255, 255, 0.95);
    }

    .atlas-country-list {
      display: grid;
      gap: 14px;
    }

    .atlas-country-card {
      border: 3px groove #333;
      background: rgba(255, 255, 255, 0.9);
      padding: 14px 16px;
    }

    .atlas-country-card h3 {
      margin: 0 0 10px;
      font-size: clamp(24px, 3vw, 32px);
      border-bottom: 1px solid #444;
      padding-bottom: 6px;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.98), 0 0 6px rgba(255, 255, 255, 0.96), 1px 1px 0 rgba(255, 255, 255, 0.92);
    }

    .atlas-fields {
      margin: 0;
      display: grid;
      grid-template-columns: minmax(190px, auto) 1fr;
      gap: 8px 12px;
      font-size: 18px;
      line-height: 1.45;
    }

    .atlas-fields dt {
      font-weight: bold;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.98), 0 0 6px rgba(255, 255, 255, 0.96), 1px 1px 0 rgba(255, 255, 255, 0.92);
    }

    .atlas-fields dd {
      margin: 0;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.97), 0 0 4px rgba(255, 255, 255, 0.95);
    }

    .atlas-timeline {
      margin: 10px 0 0;
      padding-left: 18px;
      font-size: 18px;
      line-height: 1.4;
    }

    .atlas-timeline li + li {
      margin-top: 8px;
    }

    .atlas-city-list {
      margin: 12px 0 0;
      padding-left: 22px;
      font-size: 18px;
      line-height: 1.4;
    }

    .atlas-notes {
      margin: 12px 0 0;
      font-size: 17px;
      font-style: italic;
      line-height: 1.45;
      color: #315b74;
    }

    .atlas-loading,
    .atlas-error {
      margin: 20px 0 0;
      font-size: 18px;
      line-height: 1.45;
      text-align: center;
    }

    @media (max-width: 700px) {
      .atlas-fields {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main>
    <section class="atlas-shell">
      <header class="atlas-heading">
        <h1>Atlas</h1>
        <img class="atlas-map" src="assets/background.jpg" alt="Map of the Parsklands" />
        <p class="atlas-intro">A living world map and country register for the Parsklands.</p>
        <nav id="atlas-region-nav" class="atlas-region-nav" aria-label="Atlas regions"></nav>
      </header>

      <div id="atlas-regions">
        <p class="atlas-loading">Loading atlas entries...</p>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script>
    const ATLAS_GOOGLE_DOC = "https://docs.google.com/document/d/1GcvISG2455Yhnzu4M4oLNjxCFVvkcyJ4eWWoMT0v_Hc/edit?usp=sharing";

    function getGoogleDocExportUrl(urlOrId) {
      const trimmed = (urlOrId || "").trim();
      if (!trimmed) return null;

      const idMatch = trimmed.match(/\/document\/d\/([a-zA-Z0-9_-]+)/);
      const docId = idMatch ? idMatch[1] : (/^[a-zA-Z0-9_-]{20,}$/.test(trimmed) ? trimmed : null);
      if (!docId) return null;

      return `https://docs.google.com/document/d/${docId}/export?format=html`;
    }

    function normalizeDocText(value) {
      return String(value || "")
        .replace(/[\u200B-\u200D\uFEFF]/g, "")
        .replace(/\u00A0/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function cleanListMarker(value) {
      return normalizeDocText(value)
        .replace(/^[-*•]\s*/, "")
        .replace(/^\.\s*/, "")
        .trim();
    }

    function isDivider(text) {
      return /^\*{8,}$/.test(text.trim());
    }

    function isPrivateAtlasText(value) {
      const text = normalizeDocText(value);
      return /^\*{3}/.test(text) && !isDivider(text);
    }

    function isTemplateHeading(text) {
      return /^(Region|Country|Province\/State|City)$/i.test(normalizeDocText(text));
    }

    function splitField(text) {
      const match = text.match(/^([^:]+):\s*(.*)$/);
      if (!match) return null;

      const label = normalizeDocText(match[1]);
      const value = normalizeDocText(match[2]);
      if (!label) return null;

      return { label, value };
    }

    function ensureRegion(atlas, name) {
      const region = {
        name,
        description: [],
        countries: []
      };
      atlas.regions.push(region);
      return region;
    }

    function ensureCountry(region, name) {
      const country = {
        name,
        fields: {},
        notes: [],
        cities: [],
        timeline: []
      };
      region.countries.push(country);
      return country;
    }

    function addFieldValue(country, label, value) {
      if (!country || !label) return;
      const existing = country.fields[label];
      if (existing && value) {
        country.fields[label] = `${existing} ${value}`;
        return;
      }
      country.fields[label] = value || "";
    }

    function getRegionId(regionName, index) {
      const slug = normalizeDocText(regionName)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");

      return `atlas-region-${slug || index + 1}`;
    }

    function parseAtlasDocFromHtml(rawHtml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(rawHtml || "", "text/html");
      const nodes = Array.from(doc.body.querySelectorAll("h1, h2, h3, h4, h5, h6, p, li"));
      const hasHeadingOneRegions = nodes.some((node) =>
        node.tagName.toLowerCase() === "h1" && !isTemplateHeading(node.textContent) && !isPrivateAtlasText(node.textContent)
      );
      const regionHeading = hasHeadingOneRegions ? "h1" : "h2";
      const countryHeading = hasHeadingOneRegions ? "h2" : "h3";
      const cityHeadingPattern = hasHeadingOneRegions ? /^h[3-6]$/ : /^h[4-6]$/;
      const atlas = { regions: [] };
      let currentRegion = null;
      let currentCountry = null;
      let currentField = "";
      let currentRegionIsPrivate = false;
      let currentCountryIsPrivate = false;

      nodes.forEach((node) => {
        const text = normalizeDocText(node.textContent);
        if (!text || isDivider(text)) return;
        if (isTemplateHeading(text)) return;

        const tag = node.tagName.toLowerCase();
        const isIndented = node.classList.contains("c4") || node.classList.contains("c21") || /^\s*\./.test(node.textContent || "");

        if (tag === regionHeading) {
          if (isPrivateAtlasText(text)) {
            currentRegion = null;
            currentCountry = null;
            currentField = "";
            currentRegionIsPrivate = true;
            currentCountryIsPrivate = false;
            return;
          }

          currentRegion = ensureRegion(atlas, text);
          currentCountry = null;
          currentField = "";
          currentRegionIsPrivate = false;
          currentCountryIsPrivate = false;
          return;
        }

        if (currentRegionIsPrivate) return;

        if (tag === countryHeading) {
          if (isPrivateAtlasText(text)) {
            currentCountry = null;
            currentField = "";
            currentCountryIsPrivate = true;
            return;
          }

          if (!currentRegion) currentRegion = ensureRegion(atlas, "Unsorted");
          currentCountry = ensureCountry(currentRegion, text);
          currentField = "";
          currentCountryIsPrivate = false;
          return;
        }

        if (isPrivateAtlasText(text)) {
          currentField = "";
          return;
        }

        if (!currentRegion) return;

        if (/^[-*•]\s*/.test(text)) {
          const countryName = cleanListMarker(text);
          if (isPrivateAtlasText(countryName)) {
            currentCountry = null;
            currentField = "";
            currentCountryIsPrivate = true;
            return;
          }

          currentCountry = ensureCountry(currentRegion, countryName);
          currentField = "";
          currentCountryIsPrivate = false;
          return;
        }

        if (currentCountryIsPrivate) return;

        if (cityHeadingPattern.test(tag)) {
          if (currentCountry) currentCountry.cities.push(text);
          return;
        }

        if (isIndented || /^\.\s*/.test(text)) {
          const cityName = cleanListMarker(text);
          if (currentCountry && !isPrivateAtlasText(cityName)) currentCountry.cities.push(cityName);
          return;
        }

        if (!currentCountry) {
          currentRegion.description.push(text);
          return;
        }

        const field = splitField(text);
        if (field) {
          if (isPrivateAtlasText(field.label) || isPrivateAtlasText(field.value)) {
            currentField = "";
            return;
          }

          currentField = field.label;
          addFieldValue(currentCountry, field.label, field.value);
          return;
        }

        if (/^Self\s*\(.+\)\s*\|\s*World\s*\(.+\)/i.test(text)) {
          addFieldValue(currentCountry, "Symbols", text);
          currentField = "Symbols";
          return;
        }

        if (/^Reference Notes$/i.test(text)) {
          currentField = "Reference Notes";
          return;
        }

        if (/^Timeline/i.test(currentField)) {
          currentCountry.timeline.push(text);
          return;
        }

        if (/^Reference Notes$/i.test(currentField)) {
          currentCountry.notes.push(text);
          return;
        }

        if (currentField && currentCountry.fields[currentField] === "") {
          currentCountry.fields[currentField] = text;
          return;
        }

        if (currentField && currentCountry.fields[currentField]) {
          currentCountry.fields[currentField] = `${currentCountry.fields[currentField]} ${text}`;
          return;
        }

        currentCountry.notes.push(text);
      });

      atlas.regions = atlas.regions
        .map((region) => ({
          ...region,
          countries: region.countries.filter((country) => country.name)
        }))
        .filter((region) => region.name && region.countries.length);

      return atlas;
    }

    function renderAtlasPage(atlasData) {
      const regionsEl = document.getElementById("atlas-regions");
      const regionNav = document.getElementById("atlas-region-nav");
      regionsEl.innerHTML = "";
      regionNav.innerHTML = "";

      if (!atlasData.regions.length) {
        regionsEl.innerHTML = '<p class="atlas-error">No atlas entries were found in the Google Doc.</p>';
        return;
      }

      atlasData.regions.forEach((region, index) => {
        const regionId = getRegionId(region.name, index);
        const navLink = document.createElement("a");
        navLink.href = `#${regionId}`;
        navLink.textContent = region.name || "...";
        regionNav.appendChild(navLink);

        const regionSection = document.createElement("section");
        regionSection.className = "atlas-region";
        regionSection.id = regionId;

        const regionHeading = document.createElement("h2");
        regionHeading.textContent = region.name || "...";
        regionSection.appendChild(regionHeading);

        if (region.description.length) {
          const regionDescription = document.createElement("p");
          regionDescription.className = "atlas-region-description";
          regionDescription.textContent = region.description.join(" ");
          regionSection.appendChild(regionDescription);
        }

        const countryList = document.createElement("div");
        countryList.className = "atlas-country-list";

        (region.countries || []).forEach((country) => {
          const countryCard = document.createElement("article");
          countryCard.className = "atlas-country-card";

          const countryName = document.createElement("h3");
          countryName.textContent = country.name || "...";
          countryCard.appendChild(countryName);

          const fields = document.createElement("dl");
          fields.className = "atlas-fields";

          Object.entries(country.fields || {}).forEach(([label, value]) => {
            if (!value && !/^(Government|Terrain\/Weather|People\/Trades|Rough Population|Symbols)$/i.test(label)) return;

            const term = document.createElement("dt");
            term.textContent = `${label} -`;
            fields.appendChild(term);

            const description = document.createElement("dd");
            description.textContent = value || "...";
            fields.appendChild(description);
          });

          if (fields.children.length) {
            countryCard.appendChild(fields);
          }

          const timelineList = document.createElement("ul");
          timelineList.className = "atlas-timeline";

          (country.timeline || []).forEach((entry) => {
            const item = document.createElement("li");
            item.textContent = entry;
            timelineList.appendChild(item);
          });

          if (timelineList.children.length) {
            countryCard.appendChild(timelineList);
          }

          if (country.cities?.length) {
            const cityList = document.createElement("ul");
            cityList.className = "atlas-city-list";
            country.cities.forEach((city) => {
              const item = document.createElement("li");
              item.textContent = city;
              cityList.appendChild(item);
            });
            countryCard.appendChild(cityList);
          }

          if (country.notes?.length) {
            const notes = document.createElement("p");
            notes.className = "atlas-notes";
            notes.textContent = country.notes.join(" ");
            countryCard.appendChild(notes);
          }

          countryList.appendChild(countryCard);
        });

        regionSection.appendChild(countryList);
        regionsEl.appendChild(regionSection);
      });
    }

    async function loadAtlasFromGoogleDoc() {
      const regionsEl = document.getElementById("atlas-regions");
      const exportUrl = getGoogleDocExportUrl(ATLAS_GOOGLE_DOC);

      try {
        const response = await fetch(exportUrl);
        if (!response.ok) throw new Error(`Google Doc request failed: ${response.status}`);

        const html = await response.text();
        renderAtlasPage(parseAtlasDocFromHtml(html));
      } catch (err) {
        console.error("Google Doc atlas load failed.", err);
        regionsEl.innerHTML = '<p class="atlas-error">The atlas could not be loaded from the Google Doc.</p>';
      }
    }

    fetch("header.html")
      .then((r) => r.text())
      .then((html) => { document.getElementById("header").innerHTML = html; })
      .catch((err) => console.error("Header failed to load.", err));

    fetch("footer.html")
      .then((r) => r.text())
      .then((html) => { document.getElementById("footer").innerHTML = html; })
      .catch((err) => console.error("Footer failed to load.", err));

    loadAtlasFromGoogleDoc();
  </script>
  <script src="under-construction.js"></script>
</body>
</html>
