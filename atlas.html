<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atlas | Door to the Parsklands</title>
  
  <!-- Page under-construction toggle: set to true or false -->
  <script>
    window.PAGE_UNDER_CONSTRUCTION = true;
  </script>
<link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Baskervville&display=swap" rel="stylesheet" />
  <style>
    main {
      min-height: 100vh;
      padding: 36px 16px 64px;
      font-family: 'Baskervville', serif;
    }

    .atlas-shell {
      max-width: 980px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.93);
      border: 4px groove #222;
      box-shadow: 4px 4px 8px #555;
      padding: 28px 24px;
    }

    .atlas-heading {
      text-align: center;
      margin-bottom: 26px;
    }

    .atlas-heading h1 {
      margin: 0 0 16px;
      font-size: clamp(30px, 4vw, 44px);
      text-shadow: 0 0 14px rgba(255, 255, 255, 0.99), 0 0 8px rgba(255, 255, 255, 0.97), 1px 1px 0 rgba(255, 255, 255, 0.95);
    }

    .atlas-map {
      width: min(100%, 760px);
      margin: 0 auto 16px;
      display: block;
      border: 3px solid #222;
      box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.2);
    }

    .atlas-intro {
      margin: 0;
      font-size: clamp(18px, 2vw, 24px);
      line-height: 1.45;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.98), 0 0 6px rgba(255, 255, 255, 0.96);
    }

    .atlas-region {
      margin-top: 24px;
    }

    .atlas-region h2 {
      margin: 0 0 12px;
      border-bottom: 2px solid #444;
      padding-bottom: 6px;
      font-size: clamp(26px, 3vw, 34px);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.98), 0 0 6px rgba(255, 255, 255, 0.96), 1px 1px 0 rgba(255, 255, 255, 0.92);
    }

    .atlas-region-media {
      margin: 0 0 14px;
      padding: 10px;
      border: 2px solid #444;
      background: rgba(255, 255, 255, 0.82);
    }

    .atlas-region-image {
      width: min(100%, 700px);
      display: block;
      margin: 0 0 10px;
      border: 2px solid #333;
      box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.2);
    }

    .atlas-region-description {
      margin: 0;
      font-size: 18px;
      line-height: 1.45;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.97), 0 0 4px rgba(255, 255, 255, 0.95);
    }

    .atlas-country-list {
      display: grid;
      gap: 14px;
    }

    .atlas-country-card {
      border: 3px groove #333;
      background: rgba(255, 255, 255, 0.9);
      padding: 14px 16px;
    }

    .atlas-country-card h3 {
      margin: 0 0 10px;
      font-size: clamp(24px, 3vw, 32px);
      border-bottom: 1px solid #444;
      padding-bottom: 6px;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.98), 0 0 6px rgba(255, 255, 255, 0.96), 1px 1px 0 rgba(255, 255, 255, 0.92);
    }

    .atlas-country-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .atlas-country-images img {
      width: 100%;
      display: block;
      border: 2px solid #333;
      box-shadow: 1px 1px 4px rgba(0, 0, 0, 0.2);
    }

    .atlas-fields {
      margin: 0;
      display: grid;
      grid-template-columns: minmax(190px, auto) 1fr;
      gap: 8px 12px;
      font-size: 18px;
      line-height: 1.45;
    }

    .atlas-fields dt {
      font-weight: bold;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.98), 0 0 6px rgba(255, 255, 255, 0.96), 1px 1px 0 rgba(255, 255, 255, 0.92);
    }

    .atlas-fields dd {
      margin: 0;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.97), 0 0 4px rgba(255, 255, 255, 0.95);
    }

    .atlas-timeline {
      margin: 10px 0 0;
      padding-left: 18px;
      font-size: 18px;
      line-height: 1.4;
    }

    .atlas-timeline li + li {
      margin-top: 8px;
    }

    .atlas-help {
      margin: 20px 0 0;
      border: 2px dashed #333;
      background: rgba(255, 255, 255, 0.72);
      padding: 10px 12px;
      font-size: 16px;
    }

    code {
      background: rgba(0, 0, 0, 0.07);
      padding: 1px 4px;
    }

    @media (max-width: 700px) {
      .atlas-fields {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main>
    <section class="atlas-shell">
      <header class="atlas-heading">
        <h1 id="atlas-page-title">Atlas</h1>
        <img id="atlas-map" class="atlas-map" src="assets/background.jpg" alt="Placeholder map" />
        <p id="atlas-page-intro" class="atlas-intro">Loading atlas entries...</p>
      </header>

      <div id="atlas-regions"></div>

      <p class="atlas-help">Edit <code>atlas-data.js</code> to update region, country, and timeline cards for this page.</p>
    </section>
  </main>

  <div id="footer"></div>

  <script src="atlas-data.js"></script>
  <script>
    function renderAtlasPage(atlasData) {
      const titleEl = document.getElementById("atlas-page-title");
      const mapEl = document.getElementById("atlas-map");
      const introEl = document.getElementById("atlas-page-intro");
      const regionsEl = document.getElementById("atlas-regions");

      titleEl.textContent = atlasData.pageTitle || "Atlas";
      mapEl.src = atlasData.heroMap?.src || "assets/background.jpg";
      mapEl.alt = atlasData.heroMap?.alt || "Placeholder map";
      introEl.textContent = atlasData.intro || "";
      regionsEl.innerHTML = "";

      atlasData.regions.forEach((region) => {
        const regionSection = document.createElement("section");
        regionSection.className = "atlas-region";

        const regionHeading = document.createElement("h2");
        regionHeading.textContent = region.name || "...";
        regionSection.appendChild(regionHeading);

        const regionMedia = document.createElement("div");
        regionMedia.className = "atlas-region-media";

        const regionImage = document.createElement("img");
        regionImage.className = "atlas-region-image";
        regionImage.src = region.image?.src || "assets/background.jpg";
        regionImage.alt = region.image?.alt || "Placeholder region image";
        regionMedia.appendChild(regionImage);

        const regionDescription = document.createElement("p");
        regionDescription.className = "atlas-region-description";
        regionDescription.textContent = region.description || "...";
        regionMedia.appendChild(regionDescription);

        regionSection.appendChild(regionMedia);

        const countryList = document.createElement("div");
        countryList.className = "atlas-country-list";

        (region.countries || []).forEach((country) => {
          const countryCard = document.createElement("article");
          countryCard.className = "atlas-country-card";

          const countryName = document.createElement("h3");
          countryName.textContent = country.name || "...";
          countryCard.appendChild(countryName);

          const imageWrap = document.createElement("div");
          imageWrap.className = "atlas-country-images";

          (country.images || [{ src: "assets/background.jpg", alt: "Placeholder country image" }]).forEach((image) => {
            const countryImage = document.createElement("img");
            countryImage.src = image.src || "assets/background.jpg";
            countryImage.alt = image.alt || "Placeholder country image";
            imageWrap.appendChild(countryImage);
          });

          countryCard.appendChild(imageWrap);

          const fields = document.createElement("dl");
          fields.className = "atlas-fields";

          const cardFields = {
            "Crest": `Self (${country.crestSelf || "..."}) | World (${country.crestWorld || "..."})`,
            "Government": country.government,
            "Terrain/Weather": country.terrainWeather,
            "People/Trades": country.peopleTrades
          };

          Object.entries(cardFields).forEach(([label, value]) => {
            const term = document.createElement("dt");
            term.textContent = `${label} -`;
            fields.appendChild(term);

            const description = document.createElement("dd");
            description.textContent = value || "...";
            fields.appendChild(description);
          });

          countryCard.appendChild(fields);

          const timelineList = document.createElement("ul");
          timelineList.className = "atlas-timeline";

          (country.timeline || []).forEach((entry) => {
            const item = document.createElement("li");
            const eventName = entry.event || "...";
            const year = entry.year || "...";
            const ruler = entry.ruler || "...";
            const population = entry.population || "...";
            const details = entry.details || "...";
            item.textContent = `${eventName}, Year ${year} - ${ruler} - Population ${population}. ${details}`;
            timelineList.appendChild(item);
          });

          if (!timelineList.children.length) {
            const emptyItem = document.createElement("li");
            emptyItem.textContent = "..., Year ... - ... - Population .... ...";
            timelineList.appendChild(emptyItem);
          }

          countryCard.appendChild(timelineList);
          countryList.appendChild(countryCard);
        });

        regionSection.appendChild(countryList);
        regionsEl.appendChild(regionSection);
      });
    }

    fetch("header.html")
      .then((r) => r.text())
      .then((html) => { document.getElementById("header").innerHTML = html; })
      .catch((err) => console.error("Header failed to load.", err));

    fetch("footer.html")
      .then((r) => r.text())
      .then((html) => { document.getElementById("footer").innerHTML = html; })
      .catch((err) => console.error("Footer failed to load.", err));

    renderAtlasPage(window.ATLAS_PAGE_DATA || {
      pageTitle: "Atlas",
      heroMap: { src: "assets/background.jpg", alt: "Placeholder map" },
      intro: "",
      regions: []
    });
  </script>
  <script src="site-config.js"></script>
  <script src="under-construction.js"></script>
</body>
</html>
