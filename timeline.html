<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Timeline | Door to the Parsklands</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Baskervville&display=swap" rel="stylesheet" />
  <style>
    main {
      min-height: 100vh;
      padding: 36px 16px 64px;
      font-family: 'Baskervville', serif;
    }

    .timeline-shell {
      max-width: 920px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.93);
      border: 4px groove #222;
      box-shadow: 4px 4px 8px #555;
      padding: 28px 24px;
    }

    .timeline-heading {
      text-align: center;
      margin: 0 0 28px;
    }

    .timeline-heading h1 {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 40px);
      text-shadow: 0 0 6px rgba(255, 255, 255, 0.95), 0 0 2px rgba(255, 255, 255, 0.98);
    }

    .timeline-heading p {
      margin: 0;
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.4;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.92);
    }

    .timeline {
      position: relative;
      margin: 0;
      padding-left: 78px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 24px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #333;
    }

    .era {
      margin: 26px 0 16px;
      padding: 10px 12px;
      border: 2px solid #222;
      background: rgba(255, 255, 255, 0.7);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-size: 18px;
      line-height: 1.4;
    }

    .era-range {
      display: block;
      text-transform: none;
      font-size: 16px;
      letter-spacing: 0;
    }

    .timeline-event {
      position: relative;
      margin: 0 0 24px;
    }

    .event-marker {
      position: absolute;
      left: -62px;
      top: 12px;
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: #222;
      border: 2px solid #f0f0f0;
      box-shadow: 0 0 0 2px #222;
    }

    .event-title {
      width: 100%;
      border: 2px solid #222;
      border-radius: 0;
      background: rgba(245, 239, 221, 0.9);
      padding: 12px 14px;
      text-align: left;
      font-family: inherit;
      font-size: clamp(18px, 2vw, 24px);
      cursor: pointer;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.92);
    }

    .event-title[aria-expanded="true"] {
      background: rgba(225, 214, 184, 0.9);
    }

    .event-card {
      display: none;
      margin-top: 8px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.92);
      border: 4px groove #333;
      box-shadow: 2px 2px 6px rgba(0, 0, 0, 0.2);
      font-size: 18px;
      line-height: 1.5;
    }

    .event-card.open {
      display: block;
    }

    .event-card h3 {
      margin: 0 0 6px;
      font-size: 28px;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.92);
    }

    .event-years,
    .event-duration,
    .event-note {
      margin: 0 0 8px;
      font-style: italic;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.92);
    }

    .event-summary {
      margin: 0 0 10px;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.92);
    }

    .event-image {
      max-width: min(100%, 420px);
      display: block;
      margin: 12px 0 0;
      border: 2px solid #222;
    }

    .timeline-help {
      margin: 24px 0 0;
      padding: 12px;
      border: 2px dashed #333;
      background: rgba(255, 255, 255, 0.72);
      font-size: 16px;
      line-height: 1.5;
    }

    code {
      background: rgba(0, 0, 0, 0.07);
      padding: 1px 4px;
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main>
    <section class="timeline-shell">
      <header class="timeline-heading">
        <h1 id="timeline-page-title">Timeline</h1>
        <p id="timeline-page-subtitle">Loading the archive entries...</p>
      </header>

      <div id="timeline" class="timeline"></div>

      <p class="timeline-help">
        Edit <code>timeline-data.js</code> to add eras and events. Changes are rendered automatically on this page.
      </p>
    </section>
  </main>

  <div id="footer"></div>

  <script src="timeline-data.js"></script>
  <script>
    function renderTimeline(documentData) {
      const titleEl = document.getElementById("timeline-page-title");
      const subtitleEl = document.getElementById("timeline-page-subtitle");
      const timelineRoot = document.getElementById("timeline");

      titleEl.textContent = documentData.title || "Timeline";
      subtitleEl.textContent = documentData.subtitle || "";
      timelineRoot.innerHTML = "";

      documentData.eras.forEach((era) => {
        const eraEl = document.createElement("section");
        eraEl.className = "era";
        eraEl.innerHTML = `${era.label}<span class="era-range">${era.range}</span>`;
        timelineRoot.appendChild(eraEl);

        era.events.forEach((event) => {
          const eventWrap = document.createElement("article");
          eventWrap.className = "timeline-event";

          const marker = document.createElement("div");
          marker.className = "event-marker";
          eventWrap.appendChild(marker);

          const title = document.createElement("button");
          title.className = "event-title";
          title.type = "button";
          title.textContent = `${event.yearsLabel} — ${event.title}`;
          title.setAttribute("aria-expanded", "false");

          const card = document.createElement("div");
          card.className = "event-card";

          const name = document.createElement("h3");
          name.textContent = event.title;
          card.appendChild(name);

          const years = document.createElement("p");
          years.className = "event-years";
          years.textContent = event.yearsLabel;
          card.appendChild(years);

          const duration = document.createElement("p");
          duration.className = "event-duration";
          duration.textContent = event.durationLabel;
          card.appendChild(duration);

          event.summary.forEach((paragraph) => {
            const line = document.createElement("p");
            line.className = "event-summary";
            line.textContent = paragraph;
            card.appendChild(line);
          });

          if (event.images && event.images.length > 0) {
            event.images.forEach((image) => {
              const img = document.createElement("img");
              img.className = "event-image";
              img.src = image.src;
              img.alt = image.alt;
              card.appendChild(img);
            });
          }

          if (event.notes) {
            const notes = document.createElement("p");
            notes.className = "event-note";
            notes.textContent = `Notes: ${event.notes}`;
            card.appendChild(notes);
          }

          title.addEventListener("click", () => {
            const isOpen = card.classList.toggle("open");
            title.setAttribute("aria-expanded", String(isOpen));
          });

          eventWrap.appendChild(title);
          eventWrap.appendChild(card);
          timelineRoot.appendChild(eventWrap);
        });
      });
    }

    fetch("header.html")
      .then(r => r.text())
      .then(html => { document.getElementById("header").innerHTML = html; })
      .catch(err => console.error("Header failed to load.", err));

    fetch("footer.html")
      .then(r => r.text())
      .then(html => { document.getElementById("footer").innerHTML = html; })
      .catch(err => console.error("Footer failed to load.", err));

    if (window.TIMELINE_DOCUMENT && Array.isArray(window.TIMELINE_DOCUMENT.eras)) {
      renderTimeline(window.TIMELINE_DOCUMENT);
    } else {
      document.getElementById("timeline-page-subtitle").textContent = "Timeline data failed to load.";
    }
  </script>
  <script src="under-construction.js"></script>
</body>
</html>
