<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Magic | Door to the Parsklands</title>
<link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Baskervville&display=swap" rel="stylesheet" />
  <style>
    main {
      min-height: 100vh;
      padding: 36px 16px 64px;
      font-family: 'Baskervville', serif;
    }

    .magic-shell {
      max-width: 940px;
      margin: 40px auto;
      background: rgba(255, 255, 255, 0.95);
      border: 4px groove #222;
      box-shadow: 4px 4px 8px #555;
      padding: 28px 24px;
    }

    .magic-heading {
      text-align: center;
      margin-bottom: 20px;
    }

    .magic-heading h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 40px);
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.98), 0 0 6px rgba(255, 255, 255, 0.96), 1px 1px 0 rgba(255, 255, 255, 0.92);
    }

    .magic-heading p {
      width: min(100%, 760px);
      margin: 0 auto;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(34, 34, 34, 0.45);
      font-size: clamp(18px, 2vw, 24px);
      color: #111;
    }

    .magic-topic-nav {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin: 14px 0 0;
      padding: 10px;
      border-top: 2px solid #444;
      border-bottom: 2px solid #444;
      background: rgba(255, 255, 255, 0.72);
    }

    .magic-topic-nav:empty {
      display: none;
    }

    .magic-topic-nav a {
      display: inline-block;
      color: #000066;
      background: #fffbe8;
      border: 2px outset #ccc;
      padding: 4px 8px;
      font-family: "Courier New", monospace;
      font-size: 15px;
      font-weight: bold;
      line-height: 1.2;
      text-decoration: none;
    }

    .magic-topic-nav a:hover,
    .magic-topic-nav a:focus {
      color: #900;
      background: #fff4c4;
      text-decoration: underline wavy #900;
    }

    .magic-loading,
    .magic-error {
      margin: 20px 0 0;
      text-align: center;
      font-size: 20px;
      line-height: 1.45;
    }

    .magic-section {
      margin-top: 24px;
      scroll-margin-top: 16px;
    }

    .magic-section h2 {
      margin: 0 0 10px;
      border-bottom: 2px solid #444;
      padding-bottom: 6px;
      font-size: clamp(26px, 3vw, 34px);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.97), 0 0 4px rgba(255, 255, 255, 0.95);
    }

    .magic-section p,
    .magic-list {
      font-size: 18px;
      line-height: 1.45;
    }

    .magic-section p {
      margin: 0 0 12px;
    }

    .magic-subsection {
      margin-top: 18px;
    }

    .magic-subsection h3 {
      margin: 0 0 10px;
      font-size: clamp(22px, 3vw, 30px);
      border-bottom: 1px solid #555;
      padding-bottom: 4px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.97), 0 0 4px rgba(255, 255, 255, 0.95);
    }

    .magic-list {
      margin: 0 0 12px;
      padding-left: 22px;
    }

    .magic-list li + li {
      margin-top: 8px;
    }

    .magic-card-grid {
      display: grid;
      gap: 12px;
      margin: 12px 0;
    }

    .magic-card {
      border: 2px solid #444;
      background: rgba(255, 255, 255, 0.92);
      padding: 10px 12px;
    }

    .magic-card h4 {
      margin: 0 0 8px;
      font-size: 23px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.97), 0 0 4px rgba(255, 255, 255, 0.95);
    }

    .magic-meta {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.45;
      font-style: italic;
    }

    .magic-card p {
      margin: 0;
    }

  </style>
</head>
<body>
  <div id="header"></div>

  <main>
    <section class="magic-shell">
      <header class="magic-heading">
        <h1>Magic</h1>
        <p>Explore different schools and studies of magic in the Parsklands.</p>
        <nav id="magic-topic-nav" class="magic-topic-nav" aria-label="Magic topics"></nav>
      </header>

      <div id="magic-sections">
        <p class="magic-loading">Loading magic entries...</p>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script>
    const MAGIC_GOOGLE_DOC = "https://docs.google.com/document/d/1IgJxc9Z3OS6OCsRqRBz4gE46WNttjTdUWfhe5NkIaVQ/edit?usp=sharing";

    function getGoogleDocExportUrl(urlOrId) {
      const trimmed = (urlOrId || "").trim();
      if (!trimmed) return null;

      const idMatch = trimmed.match(/\/document\/d\/([a-zA-Z0-9_-]+)/);
      const docId = idMatch ? idMatch[1] : (/^[a-zA-Z0-9_-]{20,}$/.test(trimmed) ? trimmed : null);
      if (!docId) return null;

      return `https://docs.google.com/document/d/${docId}/export?format=html`;
    }

    function normalizeDocText(value) {
      return String(value || "")
        .replace(/[\u200B-\u200D\uFEFF]/g, "")
        .replace(/\u00A0/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function cleanListMarker(value) {
      return normalizeDocText(value)
        .replace(/^[-*•]\s*/, "")
        .replace(/^\.\s*/, "")
        .trim();
    }

    function getTopicId(topicName, index) {
      const slug = normalizeDocText(topicName)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");

      return `magic-topic-${slug || index + 1}`;
    }

    function isDottedItem(text) {
      return /^\s*[.*•-]\s+/.test(text);
    }

    function parseMaterialLine(text) {
      const cleaned = cleanListMarker(text);
      if (!cleaned.includes("|")) return null;

      const parts = cleaned.split("|").map((part) => normalizeDocText(part)).filter(Boolean);
      if (!parts.length) return null;

      return {
        name: parts[0],
        meta: parts.slice(1),
        details: []
      };
    }

    function getCurrentBucket(section, subsection) {
      return subsection || section;
    }

    function parseMagicDocFromHtml(rawHtml) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(rawHtml || "", "text/html");
      const nodes = Array.from(doc.body.querySelectorAll("h1, h2, h3, h4, h5, h6, p, li"));
      const guide = { sections: [] };
      let currentSection = null;
      let currentSubsection = null;
      let currentCard = null;

      const ensureSection = (name) => {
        const section = { name, blocks: [], subsections: [] };
        guide.sections.push(section);
        return section;
      };

      const ensureSubsection = (name) => {
        if (!currentSection) currentSection = ensureSection("Notes");
        const subsection = { name, blocks: [] };
        currentSection.subsections.push(subsection);
        return subsection;
      };

      nodes.forEach((node) => {
        const text = normalizeDocText(node.textContent);
        if (!text) return;

        const tag = node.tagName.toLowerCase();
        if (tag === "h1") return;

        if (tag === "h2") {
          currentSection = ensureSection(text);
          currentSubsection = null;
          currentCard = null;
          return;
        }

        if (/^h[3-6]$/.test(tag)) {
          currentSubsection = ensureSubsection(text);
          currentCard = null;
          return;
        }

        if (!currentSection) return;

        const bucket = getCurrentBucket(currentSection, currentSubsection);
        if (isDottedItem(node.textContent || text)) {
          const material = parseMaterialLine(text);
          if (material && material.name) {
            currentCard = material;
            bucket.blocks.push({ type: "card", card: currentCard });
            return;
          }

          bucket.blocks.push({ type: "listItem", text: cleanListMarker(text) });
          currentCard = null;
          return;
        }

        if (currentCard) {
          currentCard.details.push(text);
          return;
        }

        bucket.blocks.push({ type: "paragraph", text });
      });

      guide.sections = guide.sections.filter((section) =>
        section.blocks.length || section.subsections.some((subsection) => subsection.blocks.length)
      );

      return guide;
    }

    function appendBlocks(parent, blocks) {
      let activeList = null;
      let activeCardGrid = null;

      blocks.forEach((block) => {
        if (block.type !== "listItem") activeList = null;
        if (block.type !== "card") activeCardGrid = null;

        if (block.type === "paragraph") {
          const paragraph = document.createElement("p");
          paragraph.textContent = block.text;
          parent.appendChild(paragraph);
          return;
        }

        if (block.type === "listItem") {
          if (!activeList) {
            activeList = document.createElement("ul");
            activeList.className = "magic-list";
            parent.appendChild(activeList);
          }

          const item = document.createElement("li");
          item.textContent = block.text;
          activeList.appendChild(item);
          return;
        }

        if (block.type === "card") {
          if (!activeCardGrid) {
            activeCardGrid = document.createElement("div");
            activeCardGrid.className = "magic-card-grid";
            parent.appendChild(activeCardGrid);
          }

          const card = document.createElement("article");
          card.className = "magic-card";

          const title = document.createElement("h4");
          title.textContent = block.card.name;
          card.appendChild(title);

          if (block.card.meta.length) {
            const meta = document.createElement("p");
            meta.className = "magic-meta";
            meta.textContent = block.card.meta.join(" | ");
            card.appendChild(meta);
          }

          if (block.card.details.length) {
            const details = document.createElement("p");
            details.textContent = block.card.details.join(" ");
            card.appendChild(details);
          }

          activeCardGrid.appendChild(card);
        }
      });
    }

    function renderMagicGuide(magicData) {
      const sectionsEl = document.getElementById("magic-sections");
      const topicNav = document.getElementById("magic-topic-nav");
      sectionsEl.innerHTML = "";
      topicNav.innerHTML = "";

      if (!magicData.sections.length) {
        sectionsEl.innerHTML = '<p class="magic-error">No magic entries were found in the Google Doc.</p>';
        return;
      }

      magicData.sections.forEach((section, index) => {
        const sectionId = getTopicId(section.name, index);
        const navLink = document.createElement("a");
        navLink.href = `#${sectionId}`;
        navLink.textContent = section.name;
        topicNav.appendChild(navLink);

        const sectionEl = document.createElement("section");
        sectionEl.className = "magic-section";
        sectionEl.id = sectionId;

        const heading = document.createElement("h2");
        heading.textContent = section.name;
        sectionEl.appendChild(heading);

        appendBlocks(sectionEl, section.blocks);

        section.subsections.forEach((subsection) => {
          const subsectionEl = document.createElement("section");
          subsectionEl.className = "magic-subsection";

          const subsectionHeading = document.createElement("h3");
          subsectionHeading.textContent = subsection.name;
          subsectionEl.appendChild(subsectionHeading);

          appendBlocks(subsectionEl, subsection.blocks);
          sectionEl.appendChild(subsectionEl);
        });

        sectionsEl.appendChild(sectionEl);
      });
    }

    async function loadMagicFromGoogleDoc() {
      const sectionsEl = document.getElementById("magic-sections");
      const exportUrl = getGoogleDocExportUrl(MAGIC_GOOGLE_DOC);

      try {
        const response = await fetch(exportUrl);
        if (!response.ok) throw new Error(`Google Doc request failed: ${response.status}`);

        const html = await response.text();
        renderMagicGuide(parseMagicDocFromHtml(html));
      } catch (err) {
        console.error("Google Doc magic load failed.", err);
        sectionsEl.innerHTML = '<p class="magic-error">The magic guide could not be loaded from the Google Doc.</p>';
      }
    }

    fetch("header.html")
      .then(r => r.text())
      .then(html => { document.getElementById("header").innerHTML = html; })
      .catch(err => console.error("Header failed to load.", err));

    fetch("footer.html")
      .then(r => r.text())
      .then(html => { document.getElementById("footer").innerHTML = html; })
      .catch(err => console.error("Footer failed to load.", err));

    loadMagicFromGoogleDoc();
  </script>
  <script src="under-construction.js"></script>
</body>
</html>
